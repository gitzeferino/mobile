<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      Boletim de Ocorrência
    </ion-title>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/tab1"></ion-back-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">

  <div class="ion-text-center ion-padding">
    <h2 class="form-title">Preencher Boletim de Ocorrência</h2>
    <p class="form-subtitle">(Seus dados estarão protegidos)</p>
  </div>

  <ion-list lines="full">
    <ion-item>
      <ion-input label="Nome Completo" label-placement="stacked" placeholder="Digite seu nome completo"></ion-input>
    </ion-item>

    <ion-item>
      <ion-input label="CPF" label-placement="stacked" placeholder="000.000.000-00"></ion-input>
    </ion-item>

    <ion-item>
      <ion-input label="Telefone" label-placement="stacked" type="tel" placeholder="(00) 00000-0000"></ion-input>
    </ion-item>

    <ion-item>
      <ion-input label="Email" label-placement="stacked" type="email" placeholder="seu.email@exemplo.com"></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="stacked">Data do Fato</ion-label>
      <ion-datetime display-format="DD/MM/YYYY" placeholder="DD/MM/AAAA"></ion-datetime>
    </ion-item>

    <ion-item>
      <ion-select label="Tipo" label-placement="stacked" value="furto">
        <ion-select-option value="furto">Furto (sem violência)</ion-select-option>
        <ion-select-option value="roubo">Roubo (com violência)</ion-select-option>
        <ion-select-option value="perda">Perda de Documentos</ion-select-option>
        <ion-select-option value="outro">Outro</ion-select-option>
      </ion-select>
    </ion-item>

    <ion-item>
      <ion-input label="Local" label-placement="stacked" placeholder="Rua, Bairro ou Ponto de Referência"></ion-input>
    </ion-item>

    <ion-item>
      <ion-textarea
        label="Detalhes"
        label-placement="stacked"
        placeholder="Descreva detalhadamente a ocorrência..."
        [autoGrow]="true"
      ></ion-textarea>
    </ion-item>
  </ion-list>

  <div class="ion-padding">
    <ion-grid>
      <ion-row>
        <ion-col size="6">
          <ion-button color="medium" expand="block" [routerLink]="['../tab1']">
            <ion-icon slot="start" name="arrow-back-outline"></ion-icon>
            Voltar
          </ion-button>
        </ion-col>
        <ion-col size="6">
          <ion-button color="success" expand="block" (click)="enviarBoletim()">
            <ion-icon slot="start" name="checkmark-outline"></ion-icon>
            Enviar
          </ion-button>
        </ion-col>
      </ion-row>
    </ion-grid>
  </div>

</ion-content>
